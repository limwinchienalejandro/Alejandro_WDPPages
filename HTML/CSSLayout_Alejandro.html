<!DOCTYPE html> <!-- Declares this document as HTML5 -->
<html lang="en"> <!-- Sets the language of the document to English -->
<head>
    <meta charset="UTF-8"> <!-- Ensures proper character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the page responsive on mobile devices -->
    <meta name="keywords" content="HTML5, HTML 5, Semantics"> <!-- Provides keywords for search engines -->
    <title>CSS Layout Example</title> <!-- Title shown in browser tab -->
    <!-- filename:CSSLayout_Alejandro.html -->
    <style>
        /* Root variables for Colors */
        :root {
            --dark-blue: #222059;
            --medium-blue: #0A5DA6;
            --light-blue: #29A7D9;
            --white: #FFFFFF;
            --green: #027333;
        }

        /* Global Styles */
        body {
            font-family: Arial, sans-serif; /* Sets default font */
            margin: 0; /* Removes default margin */
            padding: 0; /* Removes default padding */
            background: var(--white); /* Background color from variable */
            color: var (--darkblue); /* Text color (note: spacing issue here) */
        }

        /* Header */
        header {
            background: var(--medium-blue); /* Header background color */
            padding: 20px; /* Space inside header */
            text-align: center; /* Centers text horizontally */
            color: var(--white); /* Header text color */
            font-size: 24px; /* Larger text size */
        }

        /* Navigation */
        nav {
            display: flex; /* Enables Flexbox layout */
            justify-content: center; /* Centers nav items horizontally */
            background: var(--light-blue); /* Nav background color */
            padding: 10px; /* Space inside nav */
        }

        nav a {
            color: var(--white); /* Link text color */
            text-decoration: none; /* Removes underline */
            margin: 0 15px; /* Horizontal spacing between links */
            font-size: 18px; /* Link text size */
        }

        /* Responsive Navigation for Mobile */
        @media (max-width:  768px) {
            nav {
                flex-direction: column; /* Stacks links vertically */
                text-align: center; /* Centers text */
            }
            nav a {
                margin: 10px 0; /* Vertical spacing between links */
            }
        }

        /* Layout Container */
        .container {
            display: grid; /* Enables CSS Grid layout */
            grid-template-columns: 2fr 1fr; /* Main Content + Sidebar */
            gap: 20px; /* Space between grid items */
            padding: 20px; /* Space inside container */
        }

        /* Resposincve Grid */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr; /* Stack items */
            }
        }

        /* Main Content */
        .main-content {
            background: var(--green); /* Background color */
            color: var(--white); /* Text color */
            padding: 20px; /* Space inside content */
            border-radius: 8px; /* Rounded corners */
        }

        /* Sidebar */
        .sidebar {
            background: var(--dark-blue); /* Sidebar background color */
            color: var(--white); /* Sidebar text color */
            padding: 20px; /* Space inside sidebar */
            border-radius: 8px; /* Rounded corners */
        }

        /* Footer */
        footer {
            background: var(--dark-blue); /* Footer background color */
            color: var(--white); /* Footer text color */
            text-align: center; /* Centers footer text */
            padding: 10px; /* Space inside footer */
            margin-top: 20px; /* Space above footer */
        }
    </style>
</head>
<body>
        <!-- Header Section -->
        <header>CSS Layout Example</header>

        <!-- Navigation Menu -->
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>

        <!-- Main Layout Container -->
        <div class="container">
            <!-- Main Content Area -->
            <div class="main-content">
                <h2>Main Content</h2>
                <p>This is an example of a flexible layout using CSS Grid.</p>
            </div>

            <!-- Sidebar Area -->
            <div class="sidebar">
                <h2>Sidebar</h2>
                <p>Additional content or links go here.</p>
            </div>
        </div>

        <!-- Footer Section -->
        <footer>&copy; 2024 CSS Layout Example</footer>
</body>
</html>
