<!DOCTYPE html> <!-- Declares this document as HTML5 -->
<html lang="en"> <!-- Sets the language of the document to English -->
    <head>
        <meta charset="UTF-8"> <!-- Ensures proper character encoding -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Makes the page responsive on mobile devices -->
        <meta name="keywords" content="HTML5, HTML 5, Semantics"> <!-- Provides keywords for search engines -->
        <title>CSS Flex Box Layout</title> <!-- Title shown in browser tab -->
        <!-- filename:CSSFlexBoxLayout_Alejandro.html -->

        <style>
            /* Defines a flex container for layout */
            .container {
                display: flex; /* Enables Flexbox layout */
                justify-content: center; /* Aligns items horizontally (centered) */
                align-items: center; /* Aligns items vertically (centered) */
                gap: 20px; /* Adds spacing between items */
            }
        </style>
    </head>
    <body>
        <!-- Header section styled as a flex container -->
        <header class="container">
            <!-- Content inside the header -->
            This is header content.
        </header>
    </body>
</html>
