<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warning Button</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Full viewport height */
            margin: 0;
            background-color: #111;
            /* Dark background for contrast */
        }

        button {
            border: none;
            color: white;
            padding: 60px 120px;
            /* Super big size */
            font-size: 50px;
            /* Huge text */
            cursor: pointer;
            border-radius: 20px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .warning {
            background-color: #ff0000;
            /* Bright Red */
        }

        .warning:hover {
            background-color: #cc0000;
            /* Darker Red */
            transform: translateY(-6px);
        }

        .warning span {
            display: block;
            font-size: 30px;
            /* Smaller subtext */
            margin-top: 20px;
            color: #fff;
        }
    </style>
</head>

<body>
    <button class="warning"
        onclick="window.open('https://pinoyreviewer.com/mock-exam/college-entrance/college-math', '_blank')">
        ⚠️ WARNING ⚠️
        <span>Eye Not Detected!!!</span>
    </button>
</body>

</html>
