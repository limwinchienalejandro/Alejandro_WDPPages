<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML5, HTML 5, Semantics"> <!-- Provides keywords for search engines -->
    <title>CSS Box Model Example</title>
    <!-- filename: CSSBoxModel_Alejandro.html  -->
    <style>
        /* Global Styles*/
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 20px;
        }

        /* Box Styling */
        .box {
            width: 250px;
            height: 150px;
            background-color: #29a7d9;
            color: #ffffff;
            padding: 20px;
            border: 5px solid #0a5da6;
            margin: 20px auto;
            text-align: center;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* Different Box Model Effects (Hover Animation) */
        .box:hover {
            background-color: #027333;
            border-color: #F2e527;
        }
    </style>
</head>

<body>
    <h2>CSS Box Model</h2>
    <div class="box">
        <p>This is a box.</p>
    </div>
</body>

</html>
