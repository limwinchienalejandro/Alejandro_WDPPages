<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro WDP Pages</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      min-height: 100vh;
    }

    header {
      background: darkgreen;
      color: white;
      padding: 1rem;
      text-align: center;
      width: 100%;
    }

    nav {
      background: antiquewhite;
      padding: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    nav a {
      text-decoration: none;
      color: darkgreen;
      font-weight: bold;
    }

    .sidebar {
      background: #f4f4f4;
      width: 200px;
      padding: 1rem;
    }

    main {
      flex: 1;
      padding: 1rem;
    }

    footer {
      background: darkgreen;
      color: white;
      text-align: center;
      padding: 0.5rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    figcaption {
      color: darkgreen;
      background-color: antiquewhite;
      display: inline;
      padding: 0.2rem 0.5rem;
    }

    .headerhighlight {
      display: block;
      font-size: 1.2rem;
      font-weight: bold;
      color: darkgreen;
    }
  </style>
</head>

<body>
  <div class="sidebar">
    <h3>Sidebar</h3>
    <ul>
      <li><a href="#">Link 1</a></li>
      <li><a href="#">Link 2</a></li>
      <li><a href="#">Link 3</a></li>
    </ul>
  </div>

  <div style="flex:1; display:flex; flex-direction:column;">
    <header>
      <span class="headerhighlight">Alejandro WDP Pages</span>
    </header>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>

    <main>
      <h2>Welcome!</h2>
      <p>This is the landing page for my Web Development Practice project.</p>
      <figure>
        <img src="https://via.placeholder.com/400x200" alt="Sample Image">
        <figcaption>Sample project image</figcaption>
      </figure>
    </main>

    <footer>
      &copy; 2026 Alejandro WDP Pages
    </footer>
  </div>
</body>

</html>
